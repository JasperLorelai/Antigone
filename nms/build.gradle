subprojects {proj ->

    dependencies {
        implementation("com.palantir.javapoet:javapoet:0.5.0")
        implementation("org.junit.jupiter:junit-jupiter:5.11.3")
        implementation("io.github.classgraph:classgraph:4.8.179")

        testRuntimeOnly("org.junit.platform:junit-platform-launcher")
    }

    test {
        useJUnitPlatform()
    }

    if (proj.name == "shared") {
        proj.plugins.withType(JavaPlugin).configureEach {
            proj.tasks.register("combineDocs", JavaExec) {
                group = "generator"
                classpath proj.sourceSets.main.compileClasspath, proj.sourceSets.main.runtimeClasspath
                mainClass = "eu.jasperlorelai.antigone.nms.shared.AntigoneCombineDocs"
            }
        }
    }
    else {
        proj.plugins.withType(JavaPlugin).configureEach {
            proj.tasks.register("generateJava", JavaExec) {
                group = "generator"
                classpath proj.sourceSets.main.compileClasspath, proj.sourceSets.main.runtimeClasspath
                mainClass = "eu.jasperlorelai.antigone.nms.shared.AntigoneGenerator"
            }

            proj.tasks.register("generateDocs", JavaExec) {
                group = "generator"
                classpath proj.sourceSets.main.compileClasspath, proj.sourceSets.main.runtimeClasspath
                mainClass = "eu.jasperlorelai.antigone.nms.shared.AntigoneDocs"
            }

            proj.tasks.named("assemble") {
                dependsOn(proj.tasks.named("generateDocs"))
            }
        }
    }

}

tasks.register("deleteDocs") {
    group = "generator"

    var docs = file(projectDir.parent + "/docs/docs.json")
    doLast {
        docs.delete()
    }
}

assemble.dependsOn(deleteDocs)

var combineTask = project(":nms:shared").tasks.named("combineDocs");

gradle.projectsEvaluated {
    combineTask.configure {
        subprojects.each { proj ->
            if (proj.name == "shared") return
            dependsOn(proj.tasks.named("generateDocs"))
        }
    }
}

assemble.finalizedBy(combineTask)
