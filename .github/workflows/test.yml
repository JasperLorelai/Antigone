name: 🚀 Test
permissions:
  checks: write
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    name: 🚀 Test
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: adopt
          java-version: 25

      - name: 📂 Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: 🧱 Build
        run: ./gradlew build

      - name: 📜 Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          require_tests: true
          report_paths: "nms/**/build/test-results/test/TEST-*.xml"
